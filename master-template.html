<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微动后台管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f0f2f5;
            font-size: 14px;
            color: #333;
            overflow: hidden;
            height: 100vh;
        }

        /* 顶部导航 */
        .top-header {
            height: 48px;
            background: #001529;
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
        }

        .logo {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 16px;
            color: rgba(255,255,255,0.85);
        }

        .top-right i {
            font-size: 16px;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #1890ff;
        }

        /* 主体布局 */
        .main-container {
            display: flex;
            height: calc(100vh - 48px);
        }

        /* 左侧菜单 */
        .sidebar {
            width: 200px;
            background: #001529;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .menu-item {
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-item:hover {
            color: #fff;
        }

        .menu-item.active {
            background: #1890ff;
            color: #fff;
        }

        .menu-item i {
            margin-right: 10px;
            font-size: 16px;
        }

        .menu-item .arrow {
            margin-left: auto;
            font-size: 12px;
            transition: transform 0.3s;
        }

        .menu-item.expanded .arrow {
            transform: rotate(180deg);
        }

        /* 可折叠菜单样式 */
        .has-submenu {
            position: relative;
        }

        .has-submenu .arrow {
            display: block;
        }

        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding-left: 50px;
        }

        .submenu.open {
            max-height: 500px;
        }

        .submenu-item {
            height: 36px;
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            font-size: 13px;
        }

        .submenu-item:hover, .submenu-item.active {
            color: #fff;
        }

        /* 右侧内容区 */
        .content {
            flex: 1;
            overflow: auto;
            padding: 16px;
            background-color: #f0f2f5;
        }

        /* 滚动条样式 */
        .content::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 面包屑 */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            color: #666;
        }

        .breadcrumb i {
            font-size: 16px;
        }

        .breadcrumb span {
            color: #999;
        }

        /* 标签页 */
        .tabs-container {
            margin-bottom: 16px;
        }

        .tabs-header {
            display: flex;
            border-bottom: 1px solid #f0f0f0;
        }

        .tab-item {
            padding: 12px 20px;
            cursor: pointer;
            color: #666;
            position: relative;
            font-size: 13px;
            transition: all 0.3s;
        }

        .tab-item:hover {
            color: #1890ff;
        }

        .tab-item.active {
            color: #1890ff;
            font-weight: 500;
        }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #1890ff;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-header">
        <div class="logo">WEID微动</div>
        <div class="top-right">
            <i class="ri-fullscreen-line"></i>
            <i class="ri-search-line"></i>
            <i class="ri-star-line"></i>
            <div class="user-info">
                <div class="user-avatar"></div>
                <span>阿文</span>
                <i class="ri-arrow-down-s-line"></i>
            </div>
        </div>
    </div>

    <!-- 主体 -->
    <div class="main-container">
        <!-- 左侧菜单 -->
        <div id="sidebar"></div>

        <!-- 右侧内容区 - 这里是动态内容区域 -->
        <div class="content" id="page-content">
            <!-- 面包屑 -->
            <div class="breadcrumb">
                <i class="ri-menu-line"></i>
                <span>首页</span>
                <span>/</span>
                <span>产品</span>
                <span>/</span>
                <span>门店预约项目</span>
            </div>

            <!-- 标签页 -->
            <div class="tabs-container">
                <div class="tabs-header">
                    <div class="tab-item active">门店预约项目</div>
                </div>
            </div>

            <!-- 页面具体内容容器 -->
            <div class="page-content">
                <!-- 具体页面内容在这里 -->
            </div>
        </div>
    </div>

    <script src="sidebar-menu.js"></script>
    <script>
        // 标签页点击事件
        const tabItems = document.querySelectorAll('.tab-item');
            tabItems.forEach(item => {
                item.addEventListener('click', function() {
                    // 移除所有标签页的激活状态
                    document.querySelectorAll('.tab-item').forEach(i => {
                        i.classList.remove('active');
                    });

                    // 激活当前标签页
                    this.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
